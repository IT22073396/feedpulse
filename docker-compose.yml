version: '3.8'
services:
frontend:
build: ./frontend
ports: ['3000:3000']
environment:
- NEXT_PUBLIC_API_URL=http://localhost:4000/api
depends_on: [backend]
restart: unless-stopped
backend:
build: ./backend
ports: ['4000:4000']
environment:
- PORT=4000
- MONGO_URI=mongodb://mongo:27017/feedpulse
- GEMINI_API_KEY=${GEMINI_API_KEY}
- JWT_SECRET=${JWT_SECRET}
- ADMIN_EMAIL=${ADMIN_EMAIL:-admin@feedpulse.com}
- ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
- FRONTEND_URL=http://localhost:3000
depends_on:
mongo:
condition: service_healthy
restart: unless-stopped
mongo:
image: mongo:7
ports: ['27017:27017']
volumes:
- mongo_data:/data/db
healthcheck:
test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
interval: 10s
timeout: 5s
retries: 5
restart: unless-stopped
volumes:
mongo_data: